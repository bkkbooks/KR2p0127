body:
  text: 散見簡牘合輯湖北江陵鳳凰山一六七號漢墓木簡木楬軺一乘騮牡馬二匹齒六歲御者一人紫盖一謁者二人侍女子二人大婢責侍女子二人綉衣大婢養女子二人綉衣大婢牛者一人大奴一人女子二人持疎枇綉大婢牛牛車一兩刱大奴四人樍大婢四人小奴一人持大奴一人持鍤小奴二人持釪大盛一合柯二枚醬桮卅枚盂四枚炙卑㔸四枚小盛二合一枚小脯檢一枚大脯檢一枚三斗壺二枚尺卑㔸六枚墨桮廿枚小杞一枚醬杞一枚傷桮卅枚大柙一枚一斗檢一枚二斗檢一枚緒卑㔸一隻食卑㔸一隻膾卑㔸二隻盆盂一枚一石缶二枚漿甖二枚竈一枚囷一枚盎二枚酒甖二枚釜一枚甗一枚肉醬一器酤酒一器藍器一辦醬一器赤綉橐一盛青奇橐一盛青奇橐一盛芬綉橐一盛八千金五穀橐一綉素綉橐一盛萬九千金繒笥合中繒直二千萬薄土一枚稻米二石粢秫二石稻䊪米二石粢粺二石稻粺米二石扇一枚札箸筲一枚固魚一枚鞠笿一枚茜笿一枚栂笿一枚李答一枚生栂笿一枚卵笿一枚采笿一枚𥯄笿一枚稻糯米二石秶秫二石稻䊪二石粢粺米二石稻稗二石
